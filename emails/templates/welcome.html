<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000000; }
    * { box-sizing: border-box; }
    img { max-width: 100%; display: block; }
    @media (prefers-color-scheme: dark) {
      .bg-main { background-color: #000000 !important; }
      .text-primary { color: #ffffff !important; }
      .text-secondary { color: #86868B !important; }
      .btn-bg { background-color: #ffffff !important; }
      .btn-text { color: #000000 !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background:#000000;">
  <center style="width:100%;background:#000000;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0"
           width="600" style="margin:0 auto;background:#000000;">
      <tr>
        <td style="padding:40px;">
          <span style="font-family:'Arial Black',sans-serif;font-size:20px;
                       font-weight:900;text-transform:uppercase;letter-spacing:2px;
                       color:#ffffff;">
            SPACEX
          </span>
        </td>
      </tr>
      <tr>
        <td style="padding:0 40px;">
          <img src="{{heroImage}}" width="520" alt="SpaceX"
               style="width:100%;border:0;" />
        </td>
      </tr>
      <tr>
        <td style="padding:40px;">
          <p style="font-family:'Arial Black',sans-serif;font-size:24px;
                    font-weight:bold;text-transform:uppercase;letter-spacing:2px;
                    color:#ffffff;margin:0 0 16px 0;">
            {{title}}
          </p>
          <p style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:15px;
                    line-height:24px;color:#86868B;margin:0 0 32px 0;">
            {{mainMessage}}
          </p>
          <table role="presentation" cellspacing="0" cellpadding="0" border="0">
            <tr>
              <td style="background:#ffffff;padding:14px 30px;">
                <a href="{{buttonUrl}}"
                   style="font-family:'Arial Black',sans-serif;font-size:12px;
                          font-weight:bold;text-transform:uppercase;letter-spacing:2px;
                          color:#000000;text-decoration:none;">
                  {{buttonText}}
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td style="padding:40px;border-top:1px solid #333333;">
          <p style="font-family:'Arial Black',sans-serif;font-size:11px;
                    color:#555555;text-align:center;margin:0 0 8px 0;">
            © {{year}} SPACEX. ALL RIGHTS RESERVED.
          </p>
          <p style="font-family:'Arial Black',sans-serif;font-size:11px;
                    color:#555555;text-align:center;margin:0;">
            HAWTHORNE, CALIFORNIA
          </p>
        </td>
      </tr>
    </table>
  </center>
</body>
</html>
